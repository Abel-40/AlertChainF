services:
  alertchain-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alertchain-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - alertchain_frontend_node_modules:/app/node_modules
      - alertchain_frontend_pnpm_store:/pnpm/store
    command: pnpm dev --host 0.0.0.0

volumes:
  alertchain_frontend_node_modules:
  alertchain_frontend_pnpm_store:
